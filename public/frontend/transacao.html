<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transações</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="container">
    <header>
        <h1>Histórico de Transações</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="deposito.html">Depósito</a>
            <a href="transferir.html">Transferir</a>
        </nav>
    </header>

    <main>
        <table id="transacoesTable">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Tipo</th>
                    <th>Valor</th>
                    <th>Usuário Destino</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </main>
    </div>
    <script>
        window.onload = function() {
            fetch('http://127.0.0.1:8000/transacoes')
                .then(response => response.json())
                .then(data => {
                    const tableBody = document.querySelector('#transacoesTable tbody');
                    data.transacoes.forEach(transacao => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${transacao.data}</td>
                            <td>${transacao.tipo}</td>
                            <td>${transacao.valor}</td>
                            <td>${transacao.usuario_destino}</td>
                        `;
                        tableBody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Erro ao carregar transações:', error);
                });
        };
    </script>
</body>
</html>
