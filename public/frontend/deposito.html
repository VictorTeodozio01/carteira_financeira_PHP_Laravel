<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depositar - Carteira Financeira</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="container">
        <h2>Depósito</h2>
    
        
        <div class="form-container">
            <form id="form-deposito">
                <label for="usuario_id">ID do Usuário:</label>
                <input type="text" id="usuario_id" name="usuario_id" placeholder="Digite o ID do Usuário" required>

                <label for="valor">Valor do Depósito:</label>
                <input type="number" id="valor" name="valor" placeholder="Digite o valor" required min="1">

                <button type="submit" >Depositar</button>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        document.getElementById('form-deposito').addEventListener('submit', function(event) {
            event.preventDefault();

            const usuario_id = document.getElementById('usuario_id').value;
            const valor = document.getElementById('valor').value;

            fetch('http://127.0.0.1:8000/api/depositar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    usuario_id: usuario_id,
                    valor: valor,
                }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    document.getElementById('message').textContent = data.message;
                    document.getElementById('message').style.color = 'green';
                }
            })
            .catch(error => {
                document.getElementById('message').textContent = 'Erro ao realizar depósito.';
                document.getElementById('message').style.color = 'red';
            });
        });
    </script>
</body>
</html>
