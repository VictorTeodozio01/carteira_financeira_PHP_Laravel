<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Carteira Financeira</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="container">
        <h2>Bem-vindo ao seu Dashboard</h2>
        <p class="saldo">Saldo disponível: R$ 1.000,00</p>
        
        <div class="actions">
            <a href="/frontend/transacao.html" class="btn">Ver Transações</a>
            <a href="/frontend/deposito.html" class="btn">Depositar</a>
            <a href="/frontend/transferir.html" class="btn">Transferir</a>
        </div>
        
        <h3>Suas transações recentes:</h3>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Descrição</th>
                    <th>Valor</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>01/03/2025</td>
                    <td>Transferência para João</td>
                    <td>-R$ 200,00</td>
                </tr>
                <tr>
                    <td>28/02/2025</td>
                    <td>Depósito</td>
                    <td>+R$ 500,00</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
